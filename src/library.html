<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' file: https: http: blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>媒体库</title>
    <link rel="stylesheet" href="./library.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Cloud Library</p>
          <h1 id="library-title">媒体库</h1>
          <p id="library-description" class="description"></p>
        </div>
        <div class="actions">
          <button id="authorize-netdisk" type="button" class="ghost">连接百度网盘</button>
          <button id="back-home" type="button" class="ghost">返回首页</button>
          <button id="reload-library" type="button" class="ghost">刷新列表</button>
        </div>
      </header>

      <section class="layout">
        <aside class="playlist">
          <div class="playlist-head">
            <h2>视频列表</h2>
            <span id="playlist-count"></span>
          </div>
          <div id="lesson-list" class="lesson-list"></div>
        </aside>

        <section class="viewer">
          <div class="player-shell">
            <video
              id="player"
              controls
              playsinline
              disablepictureinpicture
              controlslist="nodownload noplaybackrate"
            ></video>
            <div id="empty-player" class="empty-player">
              <h2 id="empty-title">还没有视频</h2>
              <p id="empty-description">先连接百度网盘，再读取指定目录里的视频。</p>
            </div>
          </div>
          <div class="meta">
            <h2 id="lesson-title">未选择视频</h2>
            <p id="lesson-description"></p>
            <p id="folder-tip" class="folder-tip"></p>
          </div>
        </section>
      </section>
    </main>
    <script src="./library.js"></script>
  </body>
  </html>
