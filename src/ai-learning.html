<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data: file:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning</title>
    <link rel="stylesheet" href="./ai-learning.css" />
  </head>
  <body>
    <main class="paper-shell">
      <section class="paper-header" aria-label="Paper summary">
        <div>
          <p class="eyebrow" data-i18n="aiLearning.eyebrow">AI Learning</p>
          <h1 data-i18n="aiLearning.paper.title">Daily Paper</h1>
        </div>
        <div class="paper-metrics">
          <div class="metric">
            <span data-i18n="aiLearning.metrics.total">Questions</span>
            <strong id="metric-total">0</strong>
          </div>
          <div class="metric">
            <span data-i18n="aiLearning.metrics.answered">Answered</span>
            <strong id="metric-answered">0</strong>
          </div>
        </div>
      </section>

      <section class="paper-layout">
        <section class="paper-panel" aria-label="Paper">
          <div class="panel-head">
            <div>
              <h2 data-i18n="aiLearning.paper.paperSection">Paper</h2>
              <p id="assignment-status" data-i18n="aiLearning.status.loading">Loading</p>
            </div>
            <button id="reload-button" type="button" class="ghost-button" data-i18n="aiLearning.buttons.reload">Reload</button>
          </div>

          <div class="paper-body">
            <nav id="question-list" class="question-list" aria-label="Questions"></nav>
            <article id="question-card" class="question-card"></article>
          </div>
        </section>

        <section class="work-panel" aria-label="Answer and draft">
          <div class="panel-head">
            <div>
              <h2 data-i18n="aiLearning.paper.workSection">Answer</h2>
              <p id="question-type-label"></p>
            </div>
          </div>

          <div id="answer-slot" class="answer-slot"></div>

          <div class="draft-area">
            <label for="current-draft" data-i18n="aiLearning.paper.draft">Draft</label>
            <textarea id="current-draft" spellcheck="false"></textarea>
          </div>

          <div class="submit-bar">
            <p id="submit-message"></p>
            <button id="submit-button" type="button" data-i18n="aiLearning.buttons.submit">Submit Set</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./i18n-browser.js"></script>
    <script src="./ai-learning.js"></script>
  </body>
</html>
