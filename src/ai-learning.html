<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data: file:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning</title>
    <link rel="stylesheet" href="./ai-learning.css" />
  </head>
  <body>
    <main class="ai-shell">
      <section class="topbar" data-i18n-aria-label="aiLearning.sections.practice" aria-label="Practice overview">
        <div>
          <p class="eyebrow" data-i18n="aiLearning.eyebrow">AI Learning</p>
          <h1 data-i18n="aiLearning.heading">Math Daily Practice</h1>
        </div>
        <div class="summary-strip">
          <div class="summary-pill">
            <span data-i18n="aiLearning.metrics.total">Questions</span>
            <strong id="metric-total">0</strong>
          </div>
          <div class="summary-pill">
            <span data-i18n="aiLearning.metrics.correct">Correct</span>
            <strong id="metric-correct">-</strong>
          </div>
          <div class="summary-pill">
            <span data-i18n="aiLearning.metrics.xp">XP</span>
            <strong id="metric-xp">0</strong>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="rail" data-i18n-aria-label="aiLearning.sections.assignment" aria-label="Question list">
          <div class="rail__head">
            <div>
              <h2 data-i18n="aiLearning.sections.assignment">Today Set</h2>
              <p id="assignment-status" data-i18n="aiLearning.status.loading">Loading</p>
            </div>
            <button id="reload-button" type="button" data-i18n="aiLearning.buttons.reload">Reload</button>
          </div>
          <div id="question-list" class="question-list"></div>
        </aside>

        <section class="practice" data-i18n-aria-label="aiLearning.sections.practice" aria-label="Practice">
          <div id="question-pane" class="question-pane"></div>
          <div class="submit-bar">
            <p id="submit-message"></p>
            <button id="submit-button" type="button" data-i18n="aiLearning.buttons.submit">Submit Set</button>
          </div>
        </section>

        <aside class="insight" data-i18n-aria-label="aiLearning.sections.aiFeedback" aria-label="Learning feedback">
          <section class="insight-panel">
            <h2 data-i18n="aiLearning.sections.grading">Grading</h2>
            <div id="result-list" class="result-list"></div>
          </section>
          <section class="insight-panel">
            <h2 data-i18n="aiLearning.sections.aiFeedback">AI Feedback</h2>
            <div id="ai-feedback" class="ai-feedback" data-i18n="aiLearning.status.submitAfter">Generated after submit</div>
          </section>
          <section class="insight-panel">
            <h2 data-i18n="aiLearning.sections.mastery">Mastery</h2>
            <div id="mastery-list" class="mastery-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="./i18n-browser.js"></script>
    <script src="./ai-learning.js"></script>
  </body>
</html>
