<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习入口</title>
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <main class="shell">
      <header class="hero">
        <h1 id="title">学习入口</h1>
        <div class="hero__actions">
          <button id="refresh-home-button" class="hero__button hero__button--soft" type="button">刷新</button>
          <button id="student-plan-button" class="hero__button" type="button">学生计划</button>
        </div>
      </header>
      <section class="dashboard">
        <section id="card-grid" class="card-grid" aria-label="学习入口"></section>
        <aside class="schedule-panel" aria-label="今日课程">
          <section class="study-box study-box--today">
            <div class="study-box__head">
              <div>
                <h2>当日计划</h2>
              </div>
              <p id="schedule-date" class="study-box__date"></p>
            </div>
            <div id="schedule-list" class="schedule-list"></div>
          </section>
          <section class="study-box study-box--calendar">
            <div class="study-box__head">
              <div>
                <h2>日历计划</h2>
              </div>
              <p id="calendar-month" class="study-box__date"></p>
            </div>
            <div id="calendar-grid" class="calendar-grid" aria-label="日历计划"></div>
            <div class="calendar-list-head">
              <h3 id="calendar-selected-date"></h3>
            </div>
            <div id="calendar-selected-list" class="calendar-selected-list"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="./home.js"></script>
  </body>
</html>
