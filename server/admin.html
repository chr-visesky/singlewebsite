<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课表管理</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --card: rgba(255, 255, 255, 0.9);
        --line: rgba(25, 35, 45, 0.1);
        --text: #1e2933;
        --muted: #5e6d79;
        --accent: #cc6a2d;
        --accent-soft: rgba(204, 106, 45, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(204, 106, 45, 0.14), transparent 28%),
          linear-gradient(180deg, #f6f0e7, #efe4d7);
        color: var(--text);
        font: 16px/1.5 "Microsoft YaHei UI", "Segoe UI", sans-serif;
      }

      main {
        width: min(780px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .hero,
      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 20px;
        background: var(--card);
        box-shadow: 0 18px 50px rgba(45, 31, 19, 0.08);
      }

      .hero h1,
      .card h2,
      .item h3 {
        margin: 0;
      }

      .hero p,
      .hint,
      .meta,
      .status,
      .item p {
        color: var(--muted);
      }

      .stack {
        display: grid;
        gap: 16px;
        margin-top: 16px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(26, 33, 41, 0.12);
        border-radius: 16px;
        padding: 12px 14px;
        background: #fffefb;
        color: var(--text);
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      .weekday-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .weekday-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(26, 33, 41, 0.1);
        border-radius: 999px;
        padding: 10px 12px;
        background: #fffefb;
      }

      .weekday-chip input {
        width: auto;
      }

      .actions,
      .item__actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: white;
        font-weight: 700;
      }

      button.secondary {
        background: var(--accent-soft);
        color: var(--accent);
      }

      button.danger {
        background: rgba(166, 32, 32, 0.12);
        color: #a62020;
      }

      .item {
        border: 1px solid rgba(26, 33, 41, 0.08);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.78);
      }

      .item__head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .pill {
        display: inline-flex;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(31, 41, 51, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .code {
        display: inline-block;
        margin-top: 6px;
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(31, 41, 51, 0.08);
        word-break: break-all;
        font-family: Consolas, "Cascadia Mono", monospace;
        font-size: 13px;
      }

      @media (max-width: 640px) {
        .weekday-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>课表管理</h1>
        <p>这里改的是服务器课表。桌面程序会按它的远程同步配置自动拉取，不需要和电脑在同一个局域网。</p>
        <p class="hint">对应入口可填：`english-course`、`great-chinese`、`teacher-library`。留空表示只提醒，不跳转。</p>
      </section>

      <section class="stack">
        <section class="card">
          <h2>新增或编辑</h2>
          <form id="schedule-form" class="stack">
            <label>
              事项名称
              <input id="title" type="text" maxlength="40" placeholder="例如：说课英语 / 晚间看书 / 数学作业" required />
            </label>
            <div class="grid" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
              <label>
                时间
                <input id="time" type="time" required />
              </label>
              <label>
                对应入口
                <input id="target" type="text" list="target-options" placeholder="留空就是只提醒" />
                <datalist id="target-options">
                  <option value="english-course"></option>
                  <option value="great-chinese"></option>
                  <option value="teacher-library"></option>
                </datalist>
              </label>
            </div>
            <label>
              星期几
              <div id="weekday-grid" class="weekday-grid"></div>
            </label>
            <label>
              提醒内容
              <textarea id="message" placeholder="例如：先把今天的阅读完成。留空时会自动用事项名称播报。"></textarea>
            </label>
            <div class="actions">
              <button type="submit">保存这一项</button>
              <button id="reset-button" type="button" class="secondary">清空表单</button>
            </div>
            <p id="status" class="status"></p>
          </form>
        </section>

        <section class="card">
          <h2>远程接口</h2>
          <p class="hint">把下面这两个值填到桌面程序的 `remoteSchedule` 里。</p>
          <div id="api-url" class="code"></div>
          <div id="read-token" class="code"></div>
        </section>

        <section class="card">
          <h2>当前课表</h2>
          <p id="updated-at" class="hint"></p>
          <div id="list" class="stack"></div>
        </section>
      </section>
    <script>
      const bootstrap = __STUDYGATE_SERVER_BOOTSTRAP__;
      const weekdayOptions = [
        { value: 1, label: '周一' },
        { value: 2, label: '周二' },
        { value: 3, label: '周三' },
        { value: 4, label: '周四' },
        { value: 5, label: '周五' },
        { value: 6, label: '周六' },
        { value: 7, label: '周日' }
      ];

      const form = document.getElementById('schedule-form');
      const titleInput = document.getElementById('title');
      const timeInput = document.getElementById('time');
      const targetInput = document.getElementById('target');
      const messageInput = document.getElementById('message');
      const weekdayGrid = document.getElementById('weekday-grid');
      const listNode = document.getElementById('list');
      const statusNode = document.getElementById('status');
      const resetButton = document.getElementById('reset-button');
      const updatedAtNode = document.getElementById('updated-at');
      const apiUrlNode = document.getElementById('api-url');
      const readTokenNode = document.getElementById('read-token');

      const state = {
        items: Array.isArray(bootstrap.items) ? bootstrap.items.slice() : [],
        editId: ''
      };

      function scheduleId() {
        return `schedule-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function weekdayLabel(days) {
        return weekdayOptions
          .filter((option) => Array.isArray(days) && days.includes(option.value))
          .map((option) => option.label)
          .join('、');
      }

      function readSelectedWeekdays() {
        return Array.from(weekdayGrid.querySelectorAll('input[type="checkbox"]:checked'))
          .map((node) => Number(node.value))
          .sort((left, right) => left - right);
      }

      function resetForm(item) {
        const nextItem = item || {
          title: '',
          time: '19:00',
          target: '',
          weekdays: [],
          message: ''
        };

        state.editId = item ? item.id : '';
        titleInput.value = nextItem.title || '';
        timeInput.value = nextItem.time || '19:00';
        targetInput.value = nextItem.target || '';
        messageInput.value = nextItem.message || '';

        weekdayGrid.querySelectorAll('input[type="checkbox"]').forEach((node) => {
          node.checked = Array.isArray(nextItem.weekdays) && nextItem.weekdays.includes(Number(node.value));
        });

        statusNode.textContent = state.editId ? '正在编辑这一项。保存后会覆盖原来的安排。' : '';
      }

      function renderWeekdays() {
        weekdayGrid.innerHTML = '';

        weekdayOptions.forEach((option) => {
          const label = document.createElement('label');
          label.className = 'weekday-chip';

          const input = document.createElement('input');
          input.type = 'checkbox';
          input.value = option.value;

          const text = document.createElement('span');
          text.textContent = option.label;

          label.append(input, text);
          weekdayGrid.append(label);
        });
      }

      function renderMeta() {
        apiUrlNode.textContent = `remoteSchedule.url = ${window.location.origin}${bootstrap.apiPath}`;
        readTokenNode.textContent = `remoteSchedule.authToken = ${bootstrap.readToken}`;
        updatedAtNode.textContent = bootstrap.updatedAt ? `最近一次保存：${bootstrap.updatedAt}` : '还没有保存记录。';
      }

      function renderList() {
        listNode.innerHTML = '';

        if (!state.items.length) {
          const empty = document.createElement('div');
          empty.className = 'item';
          empty.innerHTML = '<h3>还没有课表</h3><p>先加一项，例如说课英语、晚间看书、数学作业。</p>';
          listNode.append(empty);
          return;
        }

        state.items
          .slice()
          .sort((left, right) => left.time.localeCompare(right.time))
          .forEach((item) => {
            const article = document.createElement('article');
            article.className = 'item';

            const head = document.createElement('div');
            head.className = 'item__head';

            const titleWrap = document.createElement('div');
            const title = document.createElement('h3');
            title.textContent = item.title;

            const meta = document.createElement('p');
            meta.className = 'meta';
            meta.textContent = `${item.time} · ${weekdayLabel(item.weekdays)} · ${item.target || '只提醒'}`;

            titleWrap.append(title, meta);

            const pill = document.createElement('span');
            pill.className = 'pill';
            pill.textContent = item.target ? '会进入指定入口' : '只提醒';

            head.append(titleWrap, pill);

            const message = document.createElement('p');
            message.textContent = item.message || `到${item.title}时间了。`;

            const actions = document.createElement('div');
            actions.className = 'item__actions';

            const editButton = document.createElement('button');
            editButton.type = 'button';
            editButton.className = 'secondary';
            editButton.textContent = '编辑';
            editButton.addEventListener('click', () => {
              resetForm(item);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            const deleteButton = document.createElement('button');
            deleteButton.type = 'button';
            deleteButton.className = 'danger';
            deleteButton.textContent = '删除';
            deleteButton.addEventListener('click', async () => {
              state.items = state.items.filter((entry) => entry.id !== item.id);
              await saveRemote('已经删除并保存。');
            });

            actions.append(editButton, deleteButton);
            article.append(head, message, actions);
            listNode.append(article);
          });
      }

      async function saveRemote(successMessage) {
        statusNode.textContent = '正在保存...';

        const response = await fetch(bootstrap.apiPath, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${bootstrap.adminToken}`
          },
          body: JSON.stringify({
            items: state.items
          })
        });

        if (!response.ok) {
          statusNode.textContent = '保存失败，请重试。';
          return;
        }

        const payload = await response.json();
        state.items = Array.isArray(payload.items) ? payload.items : [];
        bootstrap.updatedAt = payload.updatedAt || new Date().toISOString();
        renderMeta();
        renderList();
        resetForm();
        statusNode.textContent = successMessage;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const weekdays = readSelectedWeekdays();

        if (!weekdays.length) {
          statusNode.textContent = '至少勾选一个星期几。';
          return;
        }

        const item = {
          id: state.editId || scheduleId(),
          title: titleInput.value.trim(),
          time: timeInput.value,
          target: targetInput.value.trim(),
          weekdays,
          message: messageInput.value.trim()
        };

        if (!item.title) {
          statusNode.textContent = '事项名称不能为空。';
          return;
        }

        if (state.editId) {
          state.items = state.items.map((entry) => (entry.id === state.editId ? item : entry));
        } else {
          state.items.push(item);
        }

        await saveRemote('已经保存到服务器。');
      });

      resetButton.addEventListener('click', () => {
        resetForm();
      });

      renderWeekdays();
      renderMeta();
      resetForm();
      renderList();
    </script>
    </main>
  </body>
</html>
